<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
  }

  body {
    font-family: 'Baloo 2', system-ui, sans-serif;
    position: relative;
    background:
      radial-gradient(700px 600px at 88% 10%, rgba(99,102,241,0.45) 0%, rgba(0,0,0,0) 55%),
      linear-gradient(135deg, #1E1B4B 0%, #312E81 55%, #1E1B4B 100%);
    color: #FFFFFF;
    display: flex;
    align-items: center;
  }

  .circle { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.04); }
  .circle.c1 { width: 320px; height: 320px; top: -120px; left: -90px; }
  .circle.c2 { width: 240px; height: 240px; bottom: -110px; right: 280px; }

  /* ---- left: brand block ---- */
  .left {
    width: 600px;
    padding: 0 0 0 70px;
    z-index: 3;
  }

  .brandrow { display: flex; align-items: center; gap: 26px; margin-bottom: 26px; }

  .logo {
    width: 124px;
    height: 124px;
    border-radius: 30px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.5), 0 0 0 2px rgba(99,102,241,0.45);
  }

  .wordmark {
    font-weight: 800;
    font-size: 70px;
    line-height: 1;
    letter-spacing: -0.5px;
    text-shadow: 0 4px 18px rgba(0,0,0,0.35);
  }
  .kicker {
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
  }

  .tagline {
    font-weight: 700;
    font-size: 38px;
    color: #FCD34D;
    margin-bottom: 30px;
    text-shadow: 0 3px 12px rgba(0,0,0,0.3);
  }

  .chips { display: flex; gap: 16px; }
  .chip {
    background: rgba(255,255,255,0.10);
    border: 1.5px solid rgba(255,255,255,0.22);
    border-radius: 999px;
    padding: 12px 24px;
    font-weight: 600;
    font-size: 24px;
    color: #fff;
  }

  /* ---- right: phone ---- */
  .right {
    position: absolute;
    right: 70px;
    top: 0;
    bottom: 0;
    width: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }

  .phone {
    width: 250px;
    padding: 9px;
    border-radius: 38px;
    background: linear-gradient(160deg, #2a2750 0%, #16142e 100%);
    transform: rotate(7deg);
    box-shadow: 0 30px 70px rgba(0,0,0,0.55), 0 0 0 2px rgba(255,255,255,0.06) inset, 0 0 90px -10px #6366F1;
  }
  .screen { border-radius: 30px; overflow: hidden; height: 470px; background:#0d0b1f; }
  .screen img { width: 100%; display: block; margin-top: -20px; }

  .star { position: absolute; font-size: 50px; filter: drop-shadow(0 6px 14px rgba(0,0,0,0.4)); }
  .star.a { top: 60px; right: 40px; transform: rotate(14deg); }
  .star.b { bottom: 70px; right: 320px; font-size: 34px; transform: rotate(-10deg); }
</style>
</head>
<body>
  <div class="circle c1"></div>
  <div class="circle c2"></div>
  <span class="star a">⭐</span>
  <span class="star b">✨</span>

  <div class="left">
    <div class="brandrow">
      <img class="logo" id="logo" alt="" />
      <div>
        <div class="kicker">LITTLE GENIUS</div>
        <div class="wordmark">Little Genius</div>
      </div>
    </div>
    <div class="tagline">Premium Offline Learning for Kids</div>
    <div class="chips">
      <span class="chip">📴 Offline</span>
      <span class="chip">🚫 Ad-Free</span>
      <span class="chip">🔓 No Sign-Up</span>
    </div>
  </div>

  <div class="right">
    <div class="phone">
      <div class="screen"><img id="shot" alt="" /></div>
    </div>
  </div>
</body>
</html>
