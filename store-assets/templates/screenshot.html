<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  /* Baloo 2 is injected at render time by generate.js (embedded base64) so this
     works fully offline. The @font-face block is added dynamically. */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
  }

  body {
    font-family: 'Baloo 2', system-ui, sans-serif;
    position: relative;
    /* base deep-indigo gradient — overridden per-slide via --bg vars */
    background:
      radial-gradient(1200px 900px at 100% -5%, var(--glow) 0%, rgba(0,0,0,0) 55%),
      linear-gradient(160deg, #1E1B4B 0%, #312E81 60%, #1E1B4B 100%);
    color: #FFFFFF;
  }

  /* faint decorative circles, echoing the splash screen */
  .circle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    pointer-events: none;
  }
  .circle.c1 { width: 520px; height: 520px; top: -160px; left: -150px; }
  .circle.c2 { width: 360px; height: 360px; bottom: 240px; right: -120px; background: var(--glow-soft); }

  /* ---- top text band ---- */
  .header {
    position: absolute;
    top: 96px;
    left: 84px;
    right: 84px;
    z-index: 3;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(252, 211, 77, 0.16);
    border: 1.5px solid rgba(252, 211, 77, 0.55);
    color: #FCD34D;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: 2px;
    padding: 12px 26px;
    border-radius: 999px;
    margin-bottom: 26px;
  }

  .headline {
    font-weight: 800;
    font-size: 78px;
    line-height: 1.04;
    letter-spacing: -0.5px;
    max-width: 900px;
    text-shadow: 0 6px 24px rgba(0,0,0,0.35);
  }
  .headline .accent { color: var(--accent); }
  .headline .star { color: #FCD34D; }

  .subtitle {
    margin-top: 22px;
    font-weight: 500;
    font-size: 34px;
    line-height: 1.3;
    color: rgba(255,255,255,0.82);
    max-width: 820px;
  }

  /* ---- device frame ---- */
  .stage {
    position: absolute;
    left: 0;
    right: 0;
    bottom: -2px;
    display: flex;
    justify-content: center;
    z-index: 2;
  }

  .phone {
    position: relative;
    width: 560px;            /* device outer width */
    padding: 16px;            /* bezel thickness */
    border-radius: 60px;
    background: linear-gradient(160deg, #2a2750 0%, #16142e 100%);
    box-shadow:
      0 40px 90px rgba(0,0,0,0.55),
      0 0 0 2px rgba(255,255,255,0.06) inset,
      0 0 120px -10px var(--accent);
  }

  .screen {
    width: 100%;
    height: 1140px;           /* tall crop — bottom of card runs off-canvas for depth */
    border-radius: 46px;
    overflow: hidden;
    background: #0d0b1f;
    position: relative;
  }

  .screen img {
    width: 100%;
    display: block;
    /* shift up slightly to de-emphasize the device status bar */
    margin-top: -34px;
  }

  /* gold star sticker accent */
  .sticker {
    position: absolute;
    font-size: 64px;
    z-index: 4;
    filter: drop-shadow(0 8px 18px rgba(0,0,0,0.4));
  }
  .sticker.s1 { top: 360px; right: 90px; transform: rotate(12deg); }
</style>
</head>
<body>
  <div class="circle c1"></div>
  <div class="circle c2"></div>

  <div class="header">
    <div class="badge" id="badge">⭐ OFFLINE · AD-FREE</div>
    <h1 class="headline" id="headline"></h1>
    <p class="subtitle" id="subtitle"></p>
  </div>

  <div class="sticker s1">⭐</div>

  <div class="stage">
    <div class="phone">
      <div class="screen">
        <img id="shot" alt="" />
      </div>
    </div>
  </div>
</body>
</html>
